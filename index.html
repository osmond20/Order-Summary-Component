<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Order summary card</title>
  <link 
  rel="preload" 
  href="/fonts/red-hat-display-v21-latin-500.woff2"
  as="font"
  type="font/woff2"
  crossorigin>
    <link 
  rel="preload" 
  href="/fonts/red-hat-display-v21-latin-700.woff2"
  as="font"
  type="font/woff2"
  crossorigin>
    <link 
  rel="preload" 
  href="/fonts/red-hat-display-v21-latin-900.woff2"
  as="font"
  type="font/woff2"
  crossorigin>
</head>
<link rel="stylesheet" href="styles.css">
<body>  
<!--PARENT CONTAINER-->
  <main class="parent-container">
    <div class="order-card-container">
      <!--IMAGE CONTAINER-->
      <div class="image-container"></div>
      <!--CONTENT-->
      <div class="content-container">
        <section class="content">
          <h2 class="content-title">Order Summary</h2>
          <p class="content-paragraph">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>
        </section>

        <section class="subscription-plan-container">
          <img class="music-icon" src="/images/icon-music.svg" alt="">
          <div class="subscription-container">
            <span>Annual Plan</span>
            <p>$59.99/year</p>
          </div>
          <a href="#">Change</a>
        </section>

        <!--BUTTONS-->
        <button class="proceed-to-pay-button" type="button">Proceed to Payment</button>
        <button class="cancel-order-button" type="button">Cancel Order</button>
      </div>
    </div>
  </main>
</body>
</html>
